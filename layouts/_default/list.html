{{ define "main" }}
<div class="list-page">
  <h1>{{ .Title }}</h1>

  {{ with .Content }}
    <div class="list-intro">{{ . }}</div>
  {{ end }}

  {{ if .Pages }}
    <ul class="list-items">
      {{ range .Pages.ByTitle }}
        <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
      {{ end }}
    </ul>
  {{ end }}
</div>
{{ end }}
